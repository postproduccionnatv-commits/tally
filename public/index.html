<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Tally"/>
  <meta name="theme-color" content="#000000"/>
  <link rel="manifest" href="/manifest.json"/>
  <title>Tally</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#000; color:#fff; height:100dvh; overflow:hidden; user-select:none; }

    /* ── MENÚ INICIAL ── */
    #screen-menu {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      height:100dvh; padding:32px;
      padding-top:max(32px, env(safe-area-inset-top));
    }
    .menu-title { font-size:28px; font-weight:700; margin-bottom:8px; text-align:center; }
    .menu-sub   { font-size:14px; color:#555; margin-bottom:48px; text-align:center; }
    .menu-btn {
      width:100%; max-width:320px; padding:22px 16px; border-radius:16px;
      border:1.5px solid #222; background:#111; margin-bottom:16px;
      cursor:pointer; text-align:left; transition:border-color .2s, background .2s;
    }
    .menu-btn:active { background:#1a1a1a; }
    .menu-btn-title { font-size:20px; font-weight:700; margin-bottom:4px; }
    .menu-btn-desc  { font-size:13px; color:#555; line-height:1.4; }
    .menu-btn.plato { border-color:#333; }
    .menu-btn.eng   { border-color:#333; }
    .conn-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#333; margin-right:6px; transition:background .3s; vertical-align:middle; }
    .conn-dot.on { background:#27ae60; }
    .menu-status { font-size:12px; color:#444; margin-top:32px; }

    /* ── SELECCIÓN DE CÁMARA ── */
    #screen-select {
      display:none; flex-direction:column;
      height:100dvh; padding:20px;
      padding-top:max(20px, env(safe-area-inset-top));
      padding-bottom:max(16px, env(safe-area-inset-bottom));
    }
    .sel-header { display:flex; align-items:center; gap:12px; margin-bottom:6px; }
    .back-small { font-size:13px; color:#444; cursor:pointer; padding:4px 0; }
    .sel-title  { font-size:20px; font-weight:700; flex:1; }
    .sel-sub    { font-size:12px; color:#444; margin-bottom:20px; }
    .grid { display:grid; gap:10px; flex:1; overflow-y:auto; }
    .grid.g2 { grid-template-columns:1fr 1fr; }
    .grid.g3 { grid-template-columns:1fr 1fr 1fr; }
    .cam-btn {
      border-radius:12px; border:1.5px solid #1a1a1a; background:#111;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      cursor:pointer; position:relative; padding:12px 8px;
      transition:border-color .15s, background .15s;
      min-height:70px;
    }
    .cam-btn.pgm  { background:#CC0000; border-color:#CC0000; }
    .cam-btn.prev { background:#007A00; border-color:#007A00; }
    .cam-name  { font-size:15px; font-weight:700; text-align:center; }
    .cam-badge { position:absolute; top:6px; right:8px; font-size:9px; font-weight:800; opacity:.85; letter-spacing:1px; }

    /* ── PANTALLA TALLY ── */
    #screen-tally {
      display:none; flex-direction:column;
      height:100dvh; position:relative;
      transition:background .12s;
    }
    .tally-back { position:absolute; top:max(16px,env(safe-area-inset-top)); left:16px; font-size:13px; color:rgba(255,255,255,.3); cursor:pointer; padding:8px; z-index:10; }
    .tally-main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .tally-state { font-size:clamp(36px,11vw,60px); font-weight:900; letter-spacing:4px; text-align:center; transition:color .12s; }
    .tally-cam   { font-size:17px; font-weight:400; margin-top:10px; opacity:.6; letter-spacing:2px; }

    /* Barra inferior: PREVIO */
    .tally-footer {
      padding:14px 20px;
      padding-bottom:max(20px, env(safe-area-inset-bottom));
      text-align:center; border-top:1px solid rgba(255,255,255,.07);
    }
    .prev-label { font-size:11px; color:rgba(255,255,255,.3); letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; }
    .prev-cam   { font-size:16px; font-weight:600; color:#27ae60; min-height:22px; }

    /* Status */
    .tally-status { position:absolute; bottom:max(56px,calc(env(safe-area-inset-bottom)+56px)); width:100%; text-align:center; font-size:11px; color:rgba(255,255,255,.18); letter-spacing:1px; pointer-events:none; }
  </style>
</head>
<body>

<!-- MENÚ INICIAL -->
<div id="screen-menu">
  <div class="menu-title">Tally Remote</div>
  <div class="menu-sub">Selecciona tu modo de trabajo</div>

  <div class="menu-btn plato" onclick="enterMode('plato')">
    <div class="menu-btn-title">📺 &nbsp;Plató</div>
    <div class="menu-btn-desc">Hasta 6 cámaras · Flash en antena · Previo visible en pantalla</div>
  </div>

  <div class="menu-btn eng" onclick="enterMode('eng')">
    <div class="menu-btn-title">🎥 &nbsp;ENG Directo</div>
    <div class="menu-btn-desc">Hasta 24 entradas · Flash en directo</div>
  </div>

  <div class="menu-status">
    <span class="conn-dot" id="menu-dot"></span>
    <span id="menu-conn">Conectando...</span>
  </div>
</div>

<!-- SELECCIÓN DE CÁMARA -->
<div id="screen-select">
  <div class="sel-header">
    <span class="back-small" onclick="goMenu()">⟵</span>
    <span class="sel-title" id="sel-title">Selecciona tu cámara</span>
  </div>
  <div class="sel-sub" id="sel-sub"></div>
  <div class="grid" id="cam-grid"></div>
</div>

<!-- PANTALLA TALLY -->
<div id="screen-tally">
  <div class="tally-back" onclick="goSelect()">⟵ Cambiar</div>
  <div class="tally-main">
    <div class="tally-state" id="tally-state">LIBRE</div>
    <div class="tally-cam"   id="tally-cam"></div>
  </div>
  <div class="tally-status" id="tally-status">Sin conexión</div>
  <div class="tally-footer" id="tally-footer" style="display:none">
    <div class="prev-label">En previo</div>
    <div class="prev-cam" id="prev-cam">—</div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
<script>
// ── Configuración de cámaras ──────────────────────────────────
const CAMERAS_PLATO = Array.from({length:6},  (_,i) => ({ label:`Cámara ${i+1}`, input:`input${i+1}` }));
const CAMERAS_ENG   = Array.from({length:24}, (_,i) => ({ label:`CAM ${i+1}`,    input:`input${i+1}` }));

const STATES = {
  pgm:      { bg:'#CC0000', label:'EN ANTENA', text:'#fff' },
  prev:     { bg:'#007A00', label:'EN PREVIO', text:'#fff' },
  inactive: { bg:'#111111', label:'LIBRE',     text:'#2a2a2a' },
  offline:  { bg:'#0a0a0a', label:'SIN SEÑAL', text:'#1a1a1a' },
};

let mode        = null;   // 'plato' | 'eng'
let cameras     = [];
let selectedCam = null;
let tallyInputs = {};
let bridgeOn    = false;
let prevTallyKey= null;
let wakeLock    = null;
let torchTrack  = null;
let torchActive = false;

// ── Flash / linterna ──────────────────────────────────────────
async function initTorch() {
  if (torchTrack) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'environment', advanced:[{torch:false}] }
    });
    torchTrack = stream.getVideoTracks()[0];
  } catch(e) {
    console.log('Torch no disponible:', e.message);
  }
}

async function setTorch(on) {
  if (!torchTrack) return;
  if (torchActive === on) return;
  try {
    await torchTrack.applyConstraints({ advanced:[{ torch: on }] });
    torchActive = on;
  } catch(e) {
    console.log('setTorch error:', e.message);
  }
}

// ── Wake Lock ─────────────────────────────────────────────────
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}

// ── Navegación ────────────────────────────────────────────────
function show(id) {
  ['screen-menu','screen-select','screen-tally'].forEach(s => {
    document.getElementById(s).style.display = (s === id) ? 'flex' : 'none';
  });
}

function goMenu() {
  setTorch(false);
  selectedCam = null;
  mode = null;
  show('screen-menu');
}

function goSelect() {
  setTorch(false);
  selectedCam = null;
  buildGrid();
  show('screen-select');
}

function enterMode(m) {
  mode    = m;
  cameras = m === 'plato' ? CAMERAS_PLATO : CAMERAS_ENG;
  document.getElementById('sel-title').textContent = m === 'plato' ? 'Selecciona tu cámara' : 'Selecciona tu entrada';
  document.getElementById('tally-footer').style.display = m === 'plato' ? 'block' : 'none';
  buildGrid();
  show('screen-select');
  // Guardar modo
  localStorage.setItem('tallyMode', m);
}

// ── Grid de cámaras ───────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('cam-grid');
  const isEng = mode === 'eng';
  grid.className = 'grid ' + (isEng ? 'g3' : 'g2');
  grid.innerHTML = '';

  const sub = document.getElementById('sel-sub');
  sub.textContent = bridgeOn ? '● Estudio conectado' : '● Estudio desconectado';
  sub.style.color = bridgeOn ? '#27ae60' : '#555';

  cameras.forEach(cam => {
    const state = tallyInputs[cam.input] || 'inactive';
    const btn = document.createElement('div');
    btn.className = 'cam-btn ' + (state === 'pgm' ? 'pgm' : state === 'prev' ? 'prev' : '');
    btn.id = 'btn-' + cam.input;
    btn.innerHTML = `<span class="cam-name">${cam.label}</span><span class="cam-badge" id="badge-${cam.input}">${state==='pgm'?'PGM':state==='prev'?'PRV':''}</span>`;
    btn.addEventListener('click', () => selectCam(cam));
    grid.appendChild(btn);
  });
}

function updateGrid() {
  cameras.forEach(cam => {
    const btn   = document.getElementById('btn-' + cam.input);
    const badge = document.getElementById('badge-' + cam.input);
    if (!btn) return;
    const state = tallyInputs[cam.input] || 'inactive';
    btn.className = 'cam-btn ' + (state==='pgm'?'pgm':state==='prev'?'prev':'');
    badge.textContent = state==='pgm'?'PGM':state==='prev'?'PRV':'';
  });
}

// ── Seleccionar cámara ────────────────────────────────────────
async function selectCam(cam) {
  selectedCam = cam;
  localStorage.setItem('selectedCam', cam.input);
  document.getElementById('tally-cam').textContent = cam.label;
  show('screen-tally');
  updateTallyScreen();
  requestWakeLock();
  await initTorch();  // pedir permiso de cámara al seleccionar
}

// ── Actualizar pantalla tally ─────────────────────────────────
function updateTallyScreen() {
  if (!selectedCam) return;

  const key = (!bridgeOn) ? 'offline' : (tallyInputs[selectedCam.input] || 'inactive');
  const s   = STATES[key];

  document.getElementById('screen-tally').style.background = s.bg;
  document.getElementById('tally-state').style.color = s.text;
  document.getElementById('tally-state').textContent = s.label;
  document.getElementById('tally-status').textContent = bridgeOn ? '● Estudio conectado' : '● Estudio desconectado';

  // Flash: encender solo en PGM
  const wantTorch = (key === 'pgm');
  setTorch(wantTorch);

  // Vibrar al entrar en antena
  if (key === 'pgm' && prevTallyKey !== 'pgm') {
    navigator.vibrate && navigator.vibrate([100, 50, 100]);
  }
  prevTallyKey = key;

  // Barra de PREVIO (solo modo plató)
  if (mode === 'plato') {
    const prevCamObj = CAMERAS_PLATO.find(c => (tallyInputs[c.input] || 'inactive') === 'prev');
    document.getElementById('prev-cam').textContent = prevCamObj ? prevCamObj.label : '—';
  }
}

// ── Socket ────────────────────────────────────────────────────
const socket = io(window.location.origin, {
  query: { role:'client' },
  reconnection: true,
  reconnectionDelay: 2000,
});

socket.on('connect', () => {
  document.getElementById('menu-dot').classList.add('on');
  document.getElementById('menu-conn').textContent = 'Conectado';
  if (document.getElementById('sel-sub')) updateGrid();
});

socket.on('disconnect', () => {
  document.getElementById('menu-dot').classList.remove('on');
  document.getElementById('menu-conn').textContent = 'Reconectando...';
  bridgeOn = false;
  updateTallyScreen();
});

socket.on('bridge-status', data => {
  bridgeOn = data.connected;
  updateGrid();
  updateTallyScreen();
});

socket.on('tally-update', data => {
  tallyInputs = data.inputs || {};
  updateGrid();
  updateTallyScreen();
});

// ── Restaurar sesión ──────────────────────────────────────────
const savedMode = localStorage.getItem('tallyMode');
const savedCam  = localStorage.getItem('selectedCam');
if (savedMode) {
  enterMode(savedMode);
  if (savedCam) {
    const cam = (savedMode === 'plato' ? CAMERAS_PLATO : CAMERAS_ENG).find(c => c.input === savedCam);
    if (cam) selectCam(cam);
  }
}
</script>
</body>
</html>
